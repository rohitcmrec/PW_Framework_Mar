# Define when the pipeline should run
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - test

playwright_tests:
  stage: test
  # Use official Microsoft Playwright image matching package.json version
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  script:
    - npm ci                     # Install project dependencies
    - npx playwright test        # Run tests (browsers are pre-installed in this image)
  artifacts:
    when: always
    paths:
      - reports/                 # Save HTML report (matches playwright.config.ts outputFolder)
      - allure-results/          # Save Allure test results
      - allure-report/           # Save Allure HTML report
      - test-results/            # Save screenshots/traces on failure
    expire_in: 30 days
